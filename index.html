<style>
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 1. 徹底移除網頁預設白邊 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden; /* 防止左右晃動 */
            background-color: #f4ece1; /* 建議填入您圖片的米色底色，避免載入時閃白 */
        }

        /* 2. 讓圖片強制滿版 */
        .full-screen-img {
            width: 100vw;       /* 寬度等於螢幕 100% */
            display: block;     /* 移除圖下方間隙 */
            margin: 0;
            padding: 0;
            border: none;
        }
    </style>
</head>
<body>

    <img src="start.gif" class="full-screen-img">

</body>
</html>
